<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <form action="#">
                <h2 style="color: rgba(0, 0, 0, 0.742);">Login</h2>
                <div class="input-box">
                    <input type="text">
                    <label>Username</label>
                </div>
                <div class="input-box">
                    <input type="password">
                    <label>Password</label>
                </div>
                <div class="forgot-section">
                    <p>
                        <input type="checkbox" class="" id="">
                        Remmember me
                    </p>
                    <a href="#">Forgot Password</a>
                </div>
                <button class="btn">Login</button>
                <div class="account-creation">
                    <span>Dont have an account <a href="#">Regester</a></span>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
